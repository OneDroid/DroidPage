<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DroidPage | Build Your Mobile App Landing Page</title>
    <meta name="description"
        content="Generate beautiful, static landing pages for your Android/iOS apps in seconds. No coding required.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
    <!-- Use local libs if CDNs are blocked -->
    <script src="assets/js/libs/FileSaver.min.js" defer></script>
</head>

<body>
    <div id="app-loader" class="app-loader">
        <div class="loader-container">
            <div class="loader-spinner"></div>
            <div class="loader-log" id="loader-log">
                <p>Starting application...</p>
            </div>
        </div>
    </div>
    <header class="app-header">
        <div class="logo-wrapper">
            <div class="action-group">
                <button id="sidebar-toggle" class="header-toggle-btn" title="Toggle Sidebar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="icon-close">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                        <path d="M9 3v18"></path>
                        <path d="m16 15-3-3 3-3"></path>
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="icon-open">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                        <path d="M9 3v18"></path>
                        <path d="m14 9 3 3-3 3"></path>
                    </svg>
                </button>
            </div>
            <div class="logo">
                <img src="assets/img/droid-page-icon.png" alt="DroidPage" class="logo-icon">
                <span>DroidPage</span>
            </div>
        </div>
        <div class="actions">
            <!-- Data Actions (Grouped with Logo area or left-aligned) -->
            <div class="action-group">
                <button id="import-btn" class="btn btn-secondary" title="Import Project">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
                        <path d="M14 2v4a2 2 0 0 0 2 2h4" />
                        <path d="M12 12v6" />
                        <path d="m15 15-3-3-3 3" />
                    </svg>
                </button>
                <button id="export-json-btn" class="btn btn-secondary" title="Export Project">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
                        <path d="M14 2v4a2 2 0 0 0 2 2h4" />
                        <path d="M12 18v-6" />
                        <path d="m9 15 3 3 3-3" />
                    </svg>
                </button>
                <button id="reset-btn" class="btn btn-danger" title="Reset">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                </button>
            </div>

            <!-- View Switches (Center aligned) -->
            <div class="view-switches header-view-switches">
                <button class="active" id="view-desktop" title="Desktop View">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                        <line x1="8" y1="21" x2="16" y2="21" />
                        <line x1="12" y1="17" x2="12" y2="21" />
                    </svg>
                </button>
                <button id="view-mobile" title="Mobile View">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                        <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- Global Actions & Main CTA (Right aligned) -->
            <div class="action-group">
                <a href="https://github.com/OneDroid/DroidPage" target="_blank" class="btn btn-secondary"
                    title="View Source on GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                        <path d="M9 18c-4.51 2-5-2-7-2" />
                    </svg>
                </a>
                <button id="theme-toggle" class="btn btn-secondary" title="Toggle Theme">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="theme-icon-light">
                        <circle cx="12" cy="12" r="5" />
                        <path
                            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="theme-icon-dark">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <button id="fullscreen-btn" class="btn btn-secondary" title="Full Screen Preview">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                        <path d="M21 8V5a2 2 0 0 0-2-2h-3"></path>
                        <path d="M3 16v3a2 2 0 0 0 2 2h3"></path>
                        <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
                    </svg>
                </button>
                <button id="download-btn" class="btn btn-primary" title="Download Website">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="builder-container">
        <!-- Sidebar - Form and Theme selection -->
        <aside class="sidebar" id="sidebar">
            <section class="theme-selection">
                <h3>Choose a Theme</h3>
                <div id="theme-list" class="theme-grid">
                    <!-- Themes loaded dynamically -->
                    <div class="theme-skeleton"></div>
                    <div class="theme-skeleton"></div>
                    <div class="theme-skeleton"></div>
                </div>
            </section>

            <section class="app-details">
                <h3>App Details</h3>
                <form id="app-form">
                    <div class="form-group">
                        <label for="app_name">App Name</label>
                        <input type="text" id="app_name" name="app_name" placeholder="E.g. FitnessTracker">
                    </div>
                    <div class="form-group">
                        <label for="tagline">Tagline</label>
                        <input type="text" id="tagline" name="tagline"
                            placeholder="E.g. Your personal workout companion">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="3"
                            placeholder="Tell users why your app is great..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="primary_color">Primary Color</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="primary_color" name="primary_color" value="#3498db">
                            <span id="color-hex">#3498db</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="play_store_link">Play Store Link</label>
                        <input type="url" id="play_store_link" name="play_store_link"
                            placeholder="https://play.google.com/store/apps/details?id=...">
                    </div>

                    <div class="form-group">
                        <label>App Icon</label>
                        <div class="image-upload" id="icon-upload">
                            <input type="file" id="app_icon_input" accept="image/*" hidden>
                            <img id="icon-preview" class="image-preview hidden">
                            <div class="upload-placeholder">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="17 8 12 3 7 8" />
                                    <line x1="12" y1="3" x2="12" y2="15" />
                                </svg>
                                <span>Click to Upload Icon</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Screenshots (Up to 3)</label>
                        <div class="screenshots-row">
                            <div class="image-upload-small" id="screenshot-1-upload">
                                <input type="file" id="screenshot_1_input" accept="image/*" hidden>
                                <img id="screenshot-1-preview" class="image-preview hidden">
                                <div class="upload-placeholder-small">1</div>
                            </div>
                            <div class="image-upload-small" id="screenshot-2-upload">
                                <input type="file" id="screenshot_2_input" accept="image/*" hidden>
                                <img id="screenshot-2-preview" class="image-preview hidden">
                                <div class="upload-placeholder-small">2</div>
                            </div>
                            <div class="image-upload-small" id="screenshot-3-upload">
                                <input type="file" id="screenshot_3_input" accept="image/*" hidden>
                                <img id="screenshot-3-preview" class="image-preview hidden">
                                <div class="upload-placeholder-small">3</div>
                            </div>
                        </div>
                    </div>
                </form>
            </section>
        </aside>

        <!-- Preview Area -->
        <section class="preview-area">
            <div id="resizer" class="resizer">
                <div class="resizer-handle" id="resizer-handle">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="preview-iframe-wrapper">
                <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
                <div id="mobile-resizer" class="mobile-resizer">
                    <div class="resizer-handle">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Project Data handling -->
    <input type="file" id="import-json-input" accept="application/json" hidden>

    <script type="module" src="assets/js/app.js"></script>
</body>

</html>
