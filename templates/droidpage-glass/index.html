<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{meta_description}}">
    <title>{{meta_title}}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="public/styles/theme.css">

    <script type="application/json" id="theme-vars">{"--font-choice":"{{font_family}}","--primary-color":"{{primary_color}}","--bg-color":"{{bg_color}}","--text-primary":"{{text_primary}}","--text-secondary":"{{text_secondary}}","--card-bg":"{{card_bg}}","--border-color":"{{border_color}}","--header-bg":"{{header_bg}}","--footer-bg":"{{footer_bg}}","--container-max-width":"{{max_width}}px"}</script>
</head>

<body>
    <main class="glass-shell">
        <section class="glass-hero">
            <div class="container">
                <div class="glass-card">
                    <span class="eyebrow">DroidPage Theme Preview</span>
                    <h1>DroidPage Glass</h1>
                    <p class="lead">This theme is a placeholder for now. The full glass-style landing page is coming soon.</p>
                    <div class="status-row">
                        <span class="status-pill">Coming Soon</span>
                        <span class="status-copy">You can select this theme today, but it currently shows a dummy structure only.</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="public/scripts/theme.js" defer></script>
</body>

</html>
