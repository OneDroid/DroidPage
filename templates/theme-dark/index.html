<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{app_name}} - {{tagline}}</title>
    <meta name="description" content="{{description}}">
    <meta name="theme-color" content="{{primary_color}}">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #0f172a; color: white;">
    <div class="main-wrapper">
        <header>
            <div class="logo-box">
                <img src="{{app_icon}}" alt="Logo">
                <span>{{app_name}}</span>
            </div>
        </header>

        <section class="hero">
            <h1>{{tagline}}</h1>
            <p>{{description}}</p>
            <a href="{{play_store_link}}" class="download-btn" style="background-color: {{primary_color}}">Get it on Play Store</a>
            <div class="phone-mockup">
                <img src="{{screenshot_1}}" alt="Screenshot">
            </div>
        </section>

        <section class="feature-images">
            <div class="sc-grid">
                <img src="{{screenshot_2}}" alt="Feature 2">
                <img src="{{screenshot_3}}" alt="Feature 3">
            </div>
        </section>

        <footer>
            <p>&copy; {{app_name}} 2024. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
